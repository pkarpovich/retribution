name: Update Hero Data

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/fetch-heroes.js --allow-partial

      - name: Commit and push if changed
        run: |
          LINES=$(git diff src/data/heroes.json | grep '^[+-]' | grep -v '^[+-][+-]' | grep -vc 'lastUpdated')
          [ "$LINES" -eq 0 ] && { git checkout src/data/heroes.json; exit 0; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/heroes.json
          git commit -m "chore(data): update hero database $(date -u +%Y-%m-%d)"
          git push
