name: Update Hero Data

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch hero data
        id: fetch
        continue-on-error: true
        run: node scripts/fetch-heroes.js --allow-partial

      - name: Commit and push if changed
        if: steps.fetch.outcome == 'success'
        run: |
          LINES=$(git diff src/data/heroes.json | grep '^[+-]' | grep -v '^[+-][+-]' | grep -v 'lastUpdated' | wc -l)
          if [ "$LINES" -eq 0 ]; then git checkout src/data/heroes.json; echo "No meaningful changes"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/heroes.json
          git commit -m "chore(data): update hero database $(date -u +%Y-%m-%d)"
          git push
