name: Update Hero Data

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout from GitHub
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone "https://pkarpovich:${GH_PAT}@github.com/pkarpovich/retribution.git" .
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump lastUpdated (mock fetch)
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src/data/heroes.json';
            const d = JSON.parse(fs.readFileSync(p, 'utf8'));
            d.lastUpdated = new Date().toISOString();
            fs.writeFileSync(p, JSON.stringify(d, null, 2));
          "

      - name: Commit and push if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if git diff --quiet src/data/heroes.json; then
            echo "No changes"
            exit 0
          fi
          git add src/data/heroes.json
          git commit -m "chore(data): bump lastUpdated $(date -u +%Y-%m-%d)"
          git push "https://pkarpovich:${GH_PAT}@github.com/pkarpovich/retribution.git" HEAD:master
