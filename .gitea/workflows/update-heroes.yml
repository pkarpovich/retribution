name: Update Hero Data

on:
  schedule:
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout from GitHub
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          git clone "https://pkarpovich:${GH_PAT}@github.com/pkarpovich/retribution.git" .
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch hero data
        env:
          MLBB_CSRF_TOKEN: ${{ secrets.MLBB_CSRF_TOKEN }}
        run: node scripts/fetch-heroes.js --allow-partial

      - name: Commit and push if changed
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          if git diff --quiet src/data/heroes.json; then
            echo "No changes"
            exit 0
          fi
          TOKEN=$(printf '%s' "$GH_PAT" | tr -d '\r\n\t ')
          git add src/data/heroes.json
          git commit -m "chore(data): bump lastUpdated $(date -u +%Y-%m-%d)"
          AUTH=$(printf '%s' "pkarpovich:${TOKEN}" | base64 | tr -d '\n')
          git -c http.extraheader="Authorization: Basic ${AUTH}" \
              -c credential.helper= \
              pull --rebase https://github.com/pkarpovich/retribution.git master
          git -c http.extraheader="Authorization: Basic ${AUTH}" \
              -c credential.helper= \
              push https://github.com/pkarpovich/retribution.git HEAD:master

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} *Update Hero Data* — ${{ job.status }}
            Commit: https://github.com/pkarpovich/retribution/commit/${{ github.sha }}
            Actor: ${{ github.actor }}
